<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Talk It Through</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --midnight: #060612;
      --neon-cyan: #00ffe0;
      --neon-violet: #bf5fff;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --glass-border: rgba(255,255,255,0.08);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--midnight);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(0,255,224,0.07), transparent),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(191,95,255,0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: relative; z-index: 10;
      padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 700;
      color: #fff; text-decoration: none;
    }
    .logo span { color: var(--neon-cyan); }
    .back-link {
      font-size: 13px; color: var(--muted);
      text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    main {
      position: relative; z-index: 1;
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }

    .auth-box { width: 100%; max-width: 420px; }

    .auth-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-header h1 {
      font-family: var(--font-display);
      font-size: 36px; font-weight: 700; color: #fff;
      margin-bottom: 8px;
    }
    .auth-header h1 em { font-style: italic; font-weight: 400; color: var(--neon-violet); }
    .auth-header p { font-size: 14px; color: var(--muted); line-height: 1.6; }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 36px;
      backdrop-filter: blur(20px);
    }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px; font-weight: 500; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 15px; font-weight: 400;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(122,122,154,0.6); }
    input:focus {
      border-color: rgba(191,95,255,0.4);
      box-shadow: 0 0 0 3px rgba(191,95,255,0.07);
    }

    .btn-submit {
      width: 100%; margin-top: 8px;
      padding: 15px;
      background: var(--neon-violet);
      color: #fff; border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 0 30px rgba(191,95,255,0.2);
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(191,95,255,0.35); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      text-align: center; margin: 20px 0;
      font-size: 12px; color: var(--muted);
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: var(--glass-border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .auth-switch { text-align: center; font-size: 14px; color: var(--muted); }
    .auth-switch a { color: var(--neon-violet); text-decoration: none; font-weight: 500; }
    .auth-switch a:hover { text-decoration: underline; }

    .msg {
      padding: 12px 16px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .msg.error { background: rgba(255,62,143,0.1); border: 1px solid rgba(255,62,143,0.2); color: #ff6aaa; }
    .msg.success { background: rgba(0,255,224,0.08); border: 1px solid rgba(0,255,224,0.2); color: var(--neon-cyan); }
    .msg.show { display: block; }

    .forgot { text-align: right; margin-top: 6px; }
    .forgot a { font-size: 12px; color: var(--muted); text-decoration: none; }
    .forgot a:hover { color: var(--text); }

    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 24px; font-size: 12px; color: var(--muted);
    }

    @media (max-width: 480px) {
      nav { padding: 16px 20px; }
      .card { padding: 24px 20px; }
      .auth-header h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Talk It <span>Through</span></a>
  <a href="index.html" class="back-link">← Back</a>
</nav>

<main>
  <div class="auth-box">
    <div class="auth-header">
      <h1><em>Welcome</em> back</h1>
      <p>Your conversations are waiting. Pick up right where you left off.</p>
    </div>

    <div class="card">
      <div class="msg" id="login-msg"></div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="identifier">Email or username</label>
          <input type="text" id="identifier" name="identifier" placeholder="you@example.com" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required>
          <div class="forgot"><a href="#">Forgot password?</a></div>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Log in</button>
      </form>
      <div class="divider">or</div>
      <div class="auth-switch">New here? <a href="register.html">Create a free account</a></div>
    </div>
  </div>
</main>

<footer>© 2025 Talk It Through. For emotional support — not a substitute for professional therapy.</footer>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('login-msg');
  const f = e.currentTarget;

  btn.disabled = true;
  btn.textContent = 'Logging in…';
  msg.className = 'msg';

  const body = {
    identifier: f.identifier.value.trim(),
    password: f.password.value
  };

  // ── WIRE YOUR API HERE ──
  // Replace with: fetch('/api/login', { method:'POST', ... })
  try {
    await new Promise(r => setTimeout(r, 700)); // simulate
    // const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    // const data = await res.json();
    // if (!data.ok) throw new Error(data.error || 'Login failed');

    msg.textContent = '✅ Welcome back! Loading your space…';
    msg.className = 'msg success show';
    setTimeout(() => location.href = 'chat.html', 900);
  } catch (err) {
    msg.textContent = '❌ ' + err.message;
    msg.className = 'msg error show';
    btn.disabled = false;
    btn.textContent = 'Log in';
  }
});
</script>
</body>
</html>
